          <span>EUR: <strong id="eur-rate">—</strong></span>
        </div>

    <main class="main">
      <div class="page active">
        <div class="page-header">
          <h1>Xərclər İdarəetməsi</h1>
          <div style="display: flex; gap: 10px">
            <button class="btn-primary" id="btn-new-expense">Yeni Xərc</button>
            <button class="btn-success" id="btn-export-expenses">
              Excel Export
            </button>
          </div>
        </div>

        <div class="stats">
          <div class="stat-card">
            <div class="stat-label">Ümumi Xərclər (Cari Ay)</div>
            <div class="stat-value" id="expense-monthly-total">0 ₼</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Ümumi Xərclər (Bütün Vaxt)</div>
            <div class="stat-value" id="expense-all-total">0 ₼</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Ən Çox Xərc Kateqoriyası</div>
            <div class="stat-value" id="expense-top-category">—</div>
          </div>
        </div>

        <div class="card">
          <div class="expenses-toolbar">
            <input
              id="expense-search"
              type="text"
              class="input"
              placeholder="Kateqoriya və ya qeyd üzrə axtar..."
            />
            <select id="expense-date-filter" class="input">
              <option value="today">Bu gün</option>
              <option value="week">Bu həftə</option>
              <option value="month" selected>Bu ay</option>
              <option value="all">Hamısı</option>
            </select>
          </div>

          <table class="table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Tarix</th>
                <th>Kateqoriya</th>
                <th>Məbləğ</th>
                <th>Qeyd</th>
                <th>Əməliyyatlar</th>
              </tr>
            </thead>
            <tbody id="expenses-table-body"></tbody>
          </table>

          <div class="pagination" id="expenses-pagination"></div>
        </div>
      </div>
    </main>

    <div id="expense-modal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Yeni Xərc</h3>
          <button class="modal-close" id="close-expense-modal">×</button>
        </div>
        <div class="modal-body">
          <div class="form">
            <select id="expense-category" class="input" required>
              <option value="">Kateqoriya seçin</option>
              <option value="COURIER">Kuryer / Logistika</option>
              <option value="MARKETING">Reklam / SMM</option>
              <option value="SALARY">Maaş</option>
              <option value="PACKAGING">Paket / Brending</option>
              <option value="OTHER">Digər</option>
            </select>
            <input
              type="number"
              id="expense-amount"
              class="input"
              placeholder="Məbləğ (₼)"
              min="0.01"
              step="0.01"
              required
            />
            <input
              type="text"
              id="expense-description"
              class="input"
              placeholder="Qısa təsvir"
              required
            />
            <textarea
              id="expense-notes"
              class="input"
              placeholder="Qeyd"
              rows="4"
            ></textarea>
          </div>
          <button class="btn-primary btn-large" id="save-expense">
            Yadda saxla
          </button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
